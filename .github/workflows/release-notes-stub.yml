name: Release Notes Stub

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate changelog contains release heading
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if ! grep -Eq "^## \\[(Unreleased|${VERSION}|${TAG})\\]" CHANGELOG.md; then
            echo "CHANGELOG.md missing section for ${VERSION} (or ${TAG})"
            exit 1
          fi

      - name: Emit release notes stub
        run: |
          mkdir -p artifacts
          cat > artifacts/release-notes.txt <<'NOTES'
          TODO: automate release notes generation from changelog + run telemetry.
          NOTES

      - name: Upload stub artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-stub
          path: artifacts/release-notes.txt
