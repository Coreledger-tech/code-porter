maxChangeLines: 300
maxFilesChanged: 10
requireTestsIfPresent: true
maxInflightRunsPerProject: 2
maxInflightRunsGlobal: 10
maxVerifyMinutesPerRun: 20
maxVerifyRetries: 2
maxEvidenceZipBytes: 52428800
defaultRecipePack: java-maven-plugin-modernize
allowedBuildSystems:
  - maven
  - gradle
  - node
verifyFailureMode: warn
verify:
  blockingFailureKinds:
    - code_compile_failure
    - code_test_failure
    - code_failure
    - java17_plugin_incompat
    - java17_module_access_test_failure
  nonBlockingFailureKinds:
    - tool_missing
    - artifact_resolution
    - repo_unreachable
    - budget_exceeded
  retryOnCachedResolution: true
  maven:
    forceUpdate: true
    prefetchPlugins: true
    purgeLocalCache: false
gradle:
  allowAndroidBaselineApply: false
remediation:
  mavenCompile:
    enabled: false
    maxIterations: 2
    maxFilesChangedPerIteration: 1
    maxLinesChangedPerIteration: 25
    maxFilesChangedTotal: 2
    maxLinesChangedTotal: 40
    allowedFixes:
      - ensure_maven_compiler_plugin_for_lombok
      - ensure_lombok_annotation_processor_path
      - remove_proc_none
  mavenTestRuntime:
    enabled: false
    maxIterations: 1
    maxFilesChangedPerIteration: 2
    maxLinesChangedPerIteration: 20
    maxFilesChangedTotal: 2
    maxLinesChangedTotal: 30
    allowedFixes:
      - ensure_add_opens_sun_nio_ch
      - ensure_add_opens_java_nio
      - ensure_add_opens_java_lang
confidenceThresholds:
  pass: 70
  needsReview: 55
